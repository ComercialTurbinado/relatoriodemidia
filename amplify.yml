version: 1
frontend:
  phases:
    preBuild:
      commands:
        - mkdir -p dist
        - cp landing-radar-instagram.html dist/index.html
        - cp protocolo-de-performance.html dist/protocolo-de-performance.html
        - mkdir -p dist/signal && cp signal.html dist/signal/index.html
    build:
      commands:
        - echo "Static build complete"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []
