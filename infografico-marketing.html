ias",esforco:"baixo"}],previsao_resultados:{"30_dias":"Alcance semanal +20%, primeiros leads via direct, engajamento mantém acima de 300","60_dias":"+10% seguidores, +15% respostas em direct, primeiras conversões em oferta digital","90_dias":"+30% alcance, +20% seguidores, funil de vendas rodando com ticket médio inicial"},carta_para_cliente_markdown:"Claudio, olhando friamente para sua conta, você construiu um ativo de engajamento raro: uma comunidade pequena, mas extremamente ativa. Seu conteúdo é genuíno, sua jornada inspira e a taxa de curtidas por post supera até players gigantes do mercado. Mas, ao analisar o cenário competitivo, especialmente @conradoadolpho, fica claro o que separa sua autoridade da monetização real: clareza de oferta e direcionamento para vendas.\n\nHoje, sua bio e seus posts falam de transformação e experiência pessoal, mas não entregam um próximo passo para quem quer comprar de você ou aprofundar a relação. Não existe um CTA claro, nem em bio, nem em conteúdo. E, mesmo com engajamento brutal, o funil trava: ninguém sabe o que fazer depois de se inspirar.\n\nOlhando para o que @conradoadolpho faz bem – alternância de formatos, storytelling com ganchos, carrosséis que ensinam e CTAs que puxam a audiência para o direct ou para um diagnóstico – fica evidente o caminho. Você precisa de carrosséis semanais que entreguem valor prático, perguntas nos Reels que incentivem comentário e, principalmente, um CTA direto para direct, lista de espera ou oferta digital. Seu tráfego já existe. Só falta canalizar para venda.\n\nNos próximos 90 dias, a meta é clara: manter a autenticidade, mas transformar engajamento em vendas. Isso passa por bio otimizada, formatos variados, hashtags estratégicas e, acima de tudo, clareza na oferta. O resultado? Mais leads por dia, seguidores qualificados e conversão real. Estou contigo para virar essa chave."},diretrizes_tecnicas:{tom_de_voz:{personalidade:"especialista direto + parceiro próximo",como_falar:["Use frases ob
