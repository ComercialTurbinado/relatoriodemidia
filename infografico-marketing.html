vice-width, initial-scale=1.0"><title>Radar Marketing — Infográfico</title><style>@import "https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Roboto:wght@400;500;700&display=swap";*,:before,:after{box-sizing:border-box;margin:0;padding:0}body{background:#0d0d0d}</style><body>

    <script type="module">import{jsx as e,jsxs as o,Fragment as i}from"react/jsx-runtime";import{StrictMode as a,useEffect as r,useState as t,useCallback as n}from"react";import{createRoot as l}from"react-dom/client";let d=window.__MARKETING_DATA__??{overview_cliente:{diagnostico_identidade:"Hoje, @saadamasco é percebido como um perfil pessoal em transformação, com forte ênfase em jornada própria de emagrecimento e lifestyle fitness. A bio destaca resultados reais (-20kg), prática de treino e nutrição e o status de estudante, transmitindo autenticidade e proximidade, mas carece de proposta comercial clara e categoria definida. O mix de formatos é quase exclusivamente Reels (92%), com carrosséis representando apenas 8% e ausência total de fotos, o que limita a diversidade de conteúdo e pontos de contato.\n\nO público percebe o perfil como motivacional, baseado em experiência pessoal, mas sem direcionamento para solução ou oferta concreta. Não há menção a produtos, serviços ou CTA explícito. O storytelling é consistente, mas falta call to action para conversão.",posicionamento_atual:"@saadamasco tem engajamento desproporcionalmente alto (taxa de 343,45) frente ao volume de seguidores (733), superando em curtidas médias (2.489) até perfis muito maiores como @conradoadolpho (251). Porém, perde em seguidores (-99,91% de gap) e em comentários médios (29 vs. 48). O perfil @rodolfooviedo é irrelevante competitivamente (sem engajamento, formatos ou hashtags significativos).",pontos_fortes:["Engajamento muito acima da média: 343,45 vs. 0,04 (@conradoadolpho)","Curtidas médias por post (2.489) superam grandes players do nicho","Histórias autênticas e pessoais geram viralização (top post: 29.037 de engajamento)","Consistência na publicação de Reels (92% do mix), aproveitando o formato de maior alcance"],pontos_fracos:["Ausência de CTA claro limita geração de leads e conversão em vendas","Bio e categoria sem foco comercial, dificultando SEO e busca intencional","Baixa diversidade de formatos: carrossel (8%), sem fotos, reduz potencial de engajamento recorrente","Sem uso estratégico de hashtags, perdendo alcance orgânico e posicionamento","Falta de oferta ou produto explícito impede monetização direta"],comparativo_concorrentes:[{handle:"@conradoadolpho",estrategia_que_funciona:"Alterna Reels (50%) e Carrosséis (50%), usa ganchos virais e CTAs de comentário para estimular interação, mesmo com baixo engajamento relativo (0,04), mantém audiência ativa e direciona para diagnóstico gratuito.",como_voce_aplica:"Introduza carrosséis semanais com storytelling de transformação e CTA para comentários e directs, além de Reels com ganchos de curiosidade e perguntas.",ganho_esperado_vendas:"+15% em DMs qualificados em 60 dias"}],caminhos_de_crescimento:[{titulo:"CTA Direto e Oferta",movimento:"Adicionar CTA explícito em bio, legendas e vídeos, direcionando para direct, lista de espera ou produto digital",porque_funciona:"Base nos CTAs de @conradoadolpho, que converte audiência para funil de vendas via direct/diagnóstico",impacto_em_vendas:"Aumento de leads/dia e primeiras conversões em até 30 dias",tempo_para_resultado:"30 dias",esforco:"baixo"},{titulo:"Diversificação de Formatos",movimento:"Incluir carrosséis semanais com dicas práticas, estudos de caso e depoimentos",porque_funciona:"Carrosséis de @conradoadolpho geram engajamento e abrem espaço para CTAs de comentário ou direct",impacto_em_vendas:"+10% no engajamento e +20% em respostas via direct em 60 dias",tempo_para_resultado:"60 dias",esforco:"médio"},{titulo:"SEO e Hashtags Estratégicas",movimento:"Atualizar bio, categoria e legendas com palavras-chave do nicho, além de usar hashtags identificadas na análise",porque_funciona:"Melhora descobribilidade, aumenta alcance orgânico e atrai público qualificado",impacto_em_vendas:"+30% em alcance e +10% em seguidores qualificados em 90 dias",tempo_para_resultado:"90 dias",esforco:"baixo"}],previsao_resultados:{"30_dias":"Alcance semanal +20%, primeiros leads via direct, engajamento mantém acima de 300","60_dias":"+10% seguidores, +15% respostas em direct, primeiras conversões em oferta digital","90_dias":"+30% alcance, +20% seguidores, funil de vendas rodando com ticket médio inicial"},carta_para_cliente_markdown:"Claudio, olhando friamente para sua conta, você construiu um ativo de engajamento raro: uma comunidade pequena, mas extremamente ativa. Seu conteúdo é genuíno, sua jornada inspira e a taxa de curtidas por post supera até players gigantes do mercado. Mas, ao analisar o cenário competitivo, especialmente @conradoadolpho, fica claro o que separa sua autoridade da monetização real: clareza de oferta e direcionamento para vendas.\n\nHoje, sua bio e seus posts falam de transformação e experiência pessoal, mas não entregam um próximo passo para quem quer comprar de você ou aprofundar a relação. Não existe um CTA claro, nem em bio, nem em conteúdo. E, mesmo com engajamento brutal, o funil trava: ninguém sabe o que fazer depois de se inspirar.\n\nOlhando para o que @conradoadolpho faz bem – alternância de formatos, storytelling com ganchos, carrosséis que ensinam e CTAs que puxam a audiência para o direct ou para um diagnóstico – fica evidente o caminho. Você precisa de carrosséis semanais que entreguem valor prático, perguntas nos Reels que incentivem comentário e, principalmente, um CTA direto para direct, lista de espera ou oferta digital. Seu tráfego já existe. Só falta canalizar para venda.\n\nNos próximos 90 dias, a meta é clara: manter a autenticidade, mas transformar engajamento em vendas. Isso passa por bio otimizada, formatos variados, hashtags estratégicas e, acima de tudo, clareza na oferta. O resultado? Mais leads por dia, seguidores qualificados e conversão real. Estou contigo para virar essa chave."},diretrizes_tecnicas:{tom_de_voz:{personalidade:"especialista direto + parceiro próximo",como_falar:["Use frases objetivas, sem rodeios","Aproxime o público com exemplos pessoais e linguagem acessíve
